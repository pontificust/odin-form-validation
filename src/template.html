<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <main class="terminal__casing">
      <section class="terminal__monitor">
          <section class="logo__wrapper">
            <h1 class="logo">
              <span>RobCo</span>
              <span>industries</span>
            </h1>
          </section>
          <form action="" class="form" data-id="form" novalidate>
            <h2 class="form__title">Robco Registration Protocol</h1>
            <div class="form__field">
              <label for="email" class="form__field-label">Email: *</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form__field-input"
                data-id="email"
                required
              />
              <span class="error"></span>
            </div>
            <div class="form__field">
              <label for="country" class="form__field-label">Country: *</label>
              <input
                type="text"
                id="country"
                name="country"
                class="form__field-input"
                data-id="country"
                required
              />
              <span class="error"></span>
            </div>
            <div class="form__field">
              <label for="postal-code" class="form__field-label"
                >Postal code: *</label
              >
              <input
                type="text"
                id="postal-code"
                name="postal-code"
                class="form__field-input"
                data-id="postal"
                required
              />
              <span class="error"></span>
            </div>
            <div class="form__field">
              <label for="password" class="form__field-label">Password: *</label>
              <input
                type="password"
                id="password"
                name="password"
                class="form__field-input"
                data-id="password"
                pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[#?!@$%^&*\-])[A-Za-z0-9#?!@$%^&*\-]{8,}"
                required
              />
              <span class="error"></span>
            </div>
            <div class="form__field">
              <label for="password-confirm" class="form__field-label"
                >Please confirm password: *</label
              >
              <input
                type="password"
                id="password-confirm"
                name="password-confirm"
                class="form__field-input"
                data-id="confirm"
                required
              />
              <span class="error"></span>
            </div>
            <div class="form__submit-wrapper">
              <button class="form__submit">submit</button>
            </div>
          </form>
      </section>
    </main>
  </body>
</html>
